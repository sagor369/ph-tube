<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PH TUBE</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      .actibe {
        background: #ff1f3d;
        color: white;
      }
    </style>
  </head>
  <body>
    <!-- nav ber -->
    <header class="py-9">
      <nav
        class="w-11/12 mx-auto flex justify-between border-b-2 pb-3 border-[#17171720]"
      >
        <div class="logo">
          <img class="w-[120px]" src="./Logo.png" alt="" />
        </div>
        <div class="Sort">
          <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input id="search_input" type="search" required placeholder="Search" />
</label>
        </div>
        <div class="Blog hidden sm:block">
          <button class="btn bg-[#FF1F3D] text-white">Blog</button>
        </div>
      </nav>
    </header>
    <!-- nav batton -->
    <nav id="creyat-categeri" class="flex justify-center gap-3">
      <div>
        <button id="btn-all" onclick="loadeVidios()" class="btn btn-sm">
          All
        </button>
      </div>
    </nav>
    <!-- vidio -->
    <section
      id="vidio-categori"
      class="w-11/12 mx-auto my-10 grid md:grid-cols-2 lg:grid-cols-4 gap-10"
    ></section>
    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
    <dialog id="video_title" class="modal">
      <div class="modal-box">
        <div id="video_conteyner"></div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn">Close</button>
          </form>
        </div>
      </div>
    </dialog>
    <script src="script/index.js"></script>
  </body>
</html>
